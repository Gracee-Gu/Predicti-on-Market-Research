stage: 4
input_candidates:
  - data/analysis/article_market_dataset.csv
  - data/stage3/article_market_dataset.csv
output_root: outputs/stage4
random_seed: 20260723
claim_gates:
  minimum_n: 80
  minimum_source_types: 2
  maximum_single_source_share: 0.85
  minimum_quality_coverage: 0.50
  require_human_adjudication_for_confirmatory: true
analysis:
  outcome: overreach_severity
  primary_predictors:
    - probability_as_public_opinion
    - representativeness_caveat
    - market_quality_caveat
    - certainty_language
    - democratic_language
    - horse_race_frame
  controls:
    - platform
    - source_type
  missing_quality_policy: explicit_missing_indicator
  bootstrap_repetitions: 1000
  permutation_repetitions: 2000
