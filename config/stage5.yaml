stage: 5
stage4_output_root: outputs/stage4
paper_output_root: outputs/stage5
manuscript_output: paper/manuscript_stage5.md
claim_status_candidates:
  - outputs/stage4/input_audit.json
  - outputs/stage4/stage4_audit.json
source_candidates:
  theory:
    - paper/research_design.md
    - docs/research_design.md
  literature:
    - paper/literature_review.md
    - docs/literature_review.md
  methods:
    - docs/stage3_sampling_and_analysis_plan.md
    - docs/stage3_codebook.md
    - docs/stage4_analysis_plan.md
  results:
    - outputs/stage4/stage4_report.md
    - paper/stage4/results_scaffold.md
required_manuscript_sections:
  - Abstract
  - Introduction
  - Theory and Hypotheses
  - Data and Methods
  - Results
  - Discussion
  - Limitations
  - Conclusion
  - Reproducibility Statement
claim_policy:
  confirmatory_ready: confirmatory
  exploratory_only: exploratory
  blocked: descriptive_only
forbidden_causal_terms_when_not_confirmatory:
  - causes
  - caused
  - leads to
  - produces
  - effect of
  - demonstrates that
  - proves that
release:
  include_raw_copyrighted_text: false
  include_secrets: false
  include_generated_outputs: true
